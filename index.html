<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apex Duo Challenge Shell Test</title>
  <link rel="icon" href="data:,">
  
<style>
    :root{
      --bg:#070a0f;
      --bg2:#0b1119;
      --panel:rgba(15,22,34,.88);
      --line:rgba(255,255,255,.08);
      --text:#f6f8fb;
      --muted:#97a4b5;
      --accent:#ff6a2b;
      --accent2:#ff9a3c;
      --glow:0 12px 40px rgba(0,0,0,.35);
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:Arial,sans-serif;
      color:var(--text);
      background:
        radial-gradient(circle at 12% 0%, rgba(255,106,43,.14), transparent 30%),
        radial-gradient(circle at 88% 8%, rgba(50,120,255,.12), transparent 28%),
        linear-gradient(180deg,var(--bg),var(--bg2));
      overflow-x:hidden;
    }

    .wrap{
      max-width:1320px;
      margin:0 auto;
      padding:22px;
    }

    .topbar{
      display:flex;
      justify-content:space-between;
      align-items:flex-start;
      gap:16px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    h1{
      margin:0;
      font-size:56px;
      line-height:.95;
      letter-spacing:-.04em;
    }

    .subtitle{
      margin-top:10px;
      color:var(--muted);
      font-size:16px;
    }

    .controls,.secondary-row{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
    }

    button{
      border:1px solid var(--line);
      border-radius:16px;
      padding:14px 18px;
      background:linear-gradient(180deg, rgba(255,255,255,.04), rgba(255,255,255,.02));
      color:var(--text);
      cursor:pointer;
      font-size:15px;
      font-weight:800;
      transition:.15s ease;
      box-shadow:var(--glow);
    }

    .primary{
      min-width:170px;
      border:none;
      color:#fff;
      background:linear-gradient(180deg,var(--accent2),var(--accent));
      font-size:18px;
      box-shadow:0 10px 30px rgba(255,106,43,.28);
    }

    .reveal-stage{
      margin-bottom:14px;
      min-height:30px;
      color:var(--muted);
      font-size:15px;
      font-weight:700;
      letter-spacing:.06em;
      text-transform:uppercase;
    }

    .mobile-tabs{
      display:none;
      gap:10px;
      margin:0 0 10px;
    }

    .mobile-tab{
      flex:1 1 0;
      min-width:0;
    }

    .mobile-tab.active{
      border-color:rgba(255,106,43,.5);
      background:linear-gradient(180deg, rgba(255,106,43,.18), rgba(255,106,43,.06));
    }

    .mobile-reveal-wrap{
      display:none;
    }

    .mobile-reveal-card{
      position:relative;
      overflow:hidden;
      min-height:430px;
      background:
        radial-gradient(circle at 90% 10%, rgba(255,255,255,.06), transparent 25%),
        linear-gradient(180deg, rgba(14,20,31,.96), rgba(18,28,42,.94));
      border:1px solid var(--line);
      border-radius:28px;
      box-shadow:var(--glow);
      margin-bottom:10px;
    }

    .card-content{
      position:relative;
      z-index:2;
      display:grid;
      grid-template-columns:1.05fr .95fr;
      min-height:430px;
    }

    .card-left{
      padding:24px 22px 22px;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .player-card-name{
      font-size:14px;
      color:var(--muted);
      letter-spacing:.16em;
      text-transform:uppercase;
      font-weight:700;
    }

    .legend-name{
      font-size:54px;
      line-height:.95;
      font-weight:900;
      letter-spacing:-.03em;
      min-height:58px;
      text-shadow:0 6px 18px rgba(0,0,0,.35);
    }

    .weapons{
      margin-top:6px;
      display:grid;
      gap:10px;
    }

    .weapon-row{
      display:grid;
      grid-template-columns:64px 1fr;
      align-items:center;
      gap:10px;
      padding:10px 12px;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(180deg, rgba(255,255,255,.03), rgba(255,255,255,.015));
      min-height:66px;
    }

    .weapon-thumb-wrap{
      width:52px;
      height:52px;
      border-radius:12px;
      display:flex;
      align-items:center;
      justify-content:center;
      background:rgba(255,255,255,.035);
      border:1px solid rgba(255,255,255,.06);
      overflow:hidden;
      font-size:11px;
      font-weight:800;
      color:var(--muted);
      letter-spacing:.06em;
    }

    .weapon-name{
      font-size:22px;
      font-weight:900;
      line-height:1.05;
    }

    .weapon-class{
      font-size:12px;
      text-transform:uppercase;
      letter-spacing:.12em;
      color:var(--muted);
      margin-top:4px;
    }

    .card-right{
      position:relative;
      min-height:430px;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      padding:16px;
    }

    .legend-image-wrap{
      position:absolute;
      inset:0;
      display:flex;
      align-items:flex-end;
      justify-content:center;
      overflow:hidden;
      z-index:1;
    }

    .legend-fallback{
      width:82%;
      aspect-ratio:.82;
      border-radius:28px;
      border:1px dashed rgba(255,255,255,.12);
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.08), transparent 30%),
        rgba(255,255,255,.03);
      display:flex;
      align-items:center;
      justify-content:center;
      color:var(--muted);
      font-weight:900;
      font-size:22px;
      text-transform:uppercase;
      letter-spacing:.08em;
      padding:20px;
      text-align:center;
    }

    .overlay-line{
      position:absolute;
      inset:auto 0 0 0;
      height:1px;
      background:linear-gradient(90deg, transparent, rgba(255,255,255,.22), transparent);
      z-index:2;
    }

    .mobile-more-wrap{
      display:none;
      margin-top:10px;
    }

    .mobile-more-btn{
      width:100%;
      margin-bottom:10px;
    }

    .mobile-more-content{
      display:none;
    }

    .mobile-more-content.open{
      display:block;
    }

    .statusbar{
      display:grid;
      grid-template-columns:repeat(4, minmax(0,1fr));
      gap:14px;
      margin:18px 0 16px;
    }

    .stat,.panel{
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:22px;
      padding:18px;
      box-shadow:var(--glow);
      backdrop-filter:blur(12px);
    }

    .stat-label{
      color:var(--muted);
      font-size:12px;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .stat-value{
      font-size:42px;
      line-height:1;
      font-weight:900;
    }

    .meta-grid{
      display:grid;
      grid-template-columns:1fr;
      gap:16px;
    }

    .panel h3{
      margin:0 0 12px;
      font-size:18px;
    }

    .small{
      font-size:13px;
      color:var(--muted);
      line-height:1.6;
    }

    @media (max-width:720px){
      .wrap{padding:10px}
      .topbar > div:first-child{display:none}
      .topbar{margin-bottom:8px}
      .controls{
        width:100%;
        display:grid;
        grid-template-columns:1fr 1fr;
        gap:8px;
      }
      .controls button{
        width:100%;
        min-width:0;
        padding:12px 10px;
        font-size:14px;
        min-height:48px;
      }
      .primary{min-width:0;font-size:15px}
      .mobile-tabs{
        display:flex;
        margin:0 0 8px;
        gap:8px;
      }
      .mobile-tab{
        min-height:44px;
        border-radius:14px;
      }
      .reveal-stage{
        min-height:18px;
        font-size:11px;
        margin-bottom:6px;
      }
      .mobile-reveal-wrap{display:block}
      .mobile-reveal-card{
        min-height:auto;
        border-radius:18px;
        margin-bottom:8px;
      }
      .mobile-reveal-card .card-content{
        grid-template-columns:1fr;
        min-height:auto;
      }
      .mobile-reveal-card .card-left{
        padding:14px 14px 8px;
        gap:8px;
      }
      .mobile-reveal-card .player-card-name{
        font-size:11px;
        letter-spacing:.18em;
      }
      .mobile-reveal-card .legend-name{
        font-size:28px;
        min-height:30px;
      }
      .mobile-reveal-card .weapons{gap:8px}
      .mobile-reveal-card .weapon-row{
        min-height:52px;
        grid-template-columns:48px 1fr;
        padding:8px 10px;
      }
      .mobile-reveal-card .weapon-thumb-wrap{
        width:36px;
        height:36px;
      }
      .mobile-reveal-card .weapon-name{font-size:15px}
      .mobile-reveal-card .weapon-class{font-size:10px}
      .mobile-reveal-card .card-right{
        min-height:165px;
        padding:4px 10px 10px;
      }
      .mobile-reveal-card .legend-fallback{
        width:100%;
        max-width:210px;
        border-radius:16px;
        font-size:16px;
      }
      .mobile-more-wrap{display:block}
      .statusbar{
        grid-template-columns:1fr 1fr;
        gap:8px;
        margin:10px 0 12px;
      }
      .stat{
        padding:12px;
        border-radius:16px;
      }
      .stat-label{font-size:10px;margin-bottom:6px}
      .stat-value{font-size:26px}
      .panel{padding:12px;border-radius:16px}
      .panel h3{margin-bottom:8px;font-size:16px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <div>
        <h1>Apex Duo Challenge</h1>
        <div class="subtitle">Shell-first no-Supabase test</div>
      </div>

      <div class="controls">
        <button id="rollBtn" class="primary">ROLL</button>
        <button id="resetAllBtn">Reset All</button>
      </div>
    </div>

    <div class="mobile-tabs" id="mobileTabs">
      <button id="showDjBtn" class="mobile-tab active">DJ</button>
      <button id="showTvdbBtn" class="mobile-tab">TVDB</button>
    </div>

    <div class="reveal-stage" id="revealStage">Shell loaded</div>

    <div class="mobile-reveal-wrap" id="mobileRevealWrap">
      <div class="mobile-reveal-card">
        <div class="card-content">
          <div class="card-left">
            <div class="player-card-name" id="mobilePlayerName">DJ READ</div>
            <div id="mobileLegend" class="legend-name">Pathfinder</div>
            <div id="mobileWeapons" class="weapons">
              <div class="weapon-row">
                <div class="weapon-thumb-wrap">IMG</div>
                <div>
                  <div class="weapon-name">R-301 Carbine</div>
                  <div class="weapon-class">AR</div>
                </div>
              </div>
              <div class="weapon-row">
                <div class="weapon-thumb-wrap">IMG</div>
                <div>
                  <div class="weapon-name">Peacekeeper</div>
                  <div class="weapon-class">Shotgun</div>
                </div>
              </div>
            </div>
          </div>
          <div class="card-right">
            <div class="legend-image-wrap">
              <div class="legend-fallback">DJ</div>
            </div>
            <div class="overlay-line"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="mobile-more-wrap">
      <button id="mobileMoreBtn" class="mobile-more-btn">More</button>
      <div id="mobileMoreContent" class="mobile-more-content">
        <div class="statusbar">
          <div class="stat">
            <div class="stat-label">Legend Cycle</div>
            <div class="stat-value">1</div>
          </div>
          <div class="stat">
            <div class="stat-label">Gun Cycle</div>
            <div class="stat-value">1</div>
          </div>
          <div class="stat">
            <div class="stat-label">Legends Left</div>
            <div class="stat-value">27</div>
          </div>
          <div class="stat">
            <div class="stat-label">Guns Left</div>
            <div class="stat-value">26</div>
          </div>
        </div>

        <div class="meta-grid">
          <div class="panel">
            <h3>Connection</h3>
            <div class="small">This test page has no Supabase, no sounds, and no heavy logic. It is only a shell test.</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const djState = {
      player: "DJ READ",
      legend: "Pathfinder",
      guns: [
        { name: "R-301 Carbine", cls: "AR" },
        { name: "Peacekeeper", cls: "Shotgun" }
      ],
      fallback: "DJ"
    };

    const tvdbState = {
      player: "TVDB",
      legend: "Wraith",
      guns: [
        { name: "Volt SMG", cls: "SMG" },
        { name: "Longbow DMR", cls: "Sniper" }
      ],
      fallback: "TVDB"
    };

    function renderMobileState(state){
      document.getElementById("mobilePlayerName").textContent = state.player;
      document.getElementById("mobileLegend").textContent = state.legend;
      document.querySelector(".legend-fallback").textContent = state.fallback;
      document.getElementById("mobileWeapons").innerHTML = state.guns.map(g => `
        <div class="weapon-row">
          <div class="weapon-thumb-wrap">IMG</div>
          <div>
            <div class="weapon-name">${g.name}</div>
            <div class="weapon-class">${g.cls}</div>
          </div>
        </div>
      `).join("");
    }

    document.getElementById("showDjBtn").addEventListener("click", () => {
      renderMobileState(djState);
      document.getElementById("showDjBtn").classList.add("active");
      document.getElementById("showTvdbBtn").classList.remove("active");
    });

    document.getElementById("showTvdbBtn").addEventListener("click", () => {
      renderMobileState(tvdbState);
      document.getElementById("showTvdbBtn").classList.add("active");
      document.getElementById("showDjBtn").classList.remove("active");
    });

    document.getElementById("mobileMoreBtn").addEventListener("click", () => {
      const content = document.getElementById("mobileMoreContent");
      const open = content.classList.toggle("open");
      document.getElementById("mobileMoreBtn").textContent = open ? "Less" : "More";
    });

    document.getElementById("rollBtn").addEventListener("click", () => {
      document.getElementById("revealStage").textContent = "Shell interaction works";
    });

    document.getElementById("resetAllBtn").addEventListener("click", () => {
      document.getElementById("revealStage").textContent = "Reset tapped";
    });
  </script>
</body>
</html>
